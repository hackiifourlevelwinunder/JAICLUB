
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="container">

<h1>ADMIN CONTROL PANEL</h1>

<div class="grid">
<div class="box"><h2 id="totalUID">0</h2>APPROVED UID</div>
<div class="box"><h2 id="onlineUsers">0</h2>ONLINE USERS</div>
<div class="box">ACTIVE SERVER</div>
<div class="box">SECURE FIREWALL</div>
</div>

<input type="text" id="newUID" placeholder="ADD UID">

<button onclick="addUID()">APPROVE UID</button>

<button class="danger" onclick="removeUID()">REMOVE UID</button>

<div class="list">
<h2>APPROVED UID LIST</h2>
<ul id="uidList"></ul>
</div>

</div>

<script src="admin.js"></script>

</body>
</html>
