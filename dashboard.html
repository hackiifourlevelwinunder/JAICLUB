<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER DASHBOARD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050505;
overflow:hidden;
color:#00ff99;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:10px;
}

.matrix{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,255,120,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,120,0.08) 1px, transparent 1px);
background-size:30px 30px;
animation:gridmove 8s linear infinite;
z-index:0;
}

@keyframes gridmove{
0%{transform:translateY(0);}
100%{transform:translateY(30px);}
}

.panel{
position:relative;
z-index:1;
width:100%;
max-width:430px;
background:rgba(0,0,0,0.82);
border:2px solid #00ff99;
border-radius:18px;
padding:20px;
box-shadow:0 0 25px #00ff99;
text-align:center;
backdrop-filter:blur(8px);
}

.panel h1{
font-size:26px;
margin-bottom:18px;
text-shadow:0 0 15px #00ff99;
}

.clock-box{
padding:14px;
border:1px solid #00ff99;
border-radius:12px;
margin-bottom:18px;
box-shadow:0 0 15px #00ff99;
}

#wallclock{
font-size:28px;
letter-spacing:2px;
}

.period-card{
padding:20px;
border:1px solid #00ff99;
border-radius:16px;
box-shadow:0 0 20px rgba(0,255,150,0.5);
margin-bottom:18px;
}

#period{
font-size:22px;
margin-bottom:18px;
}

.number-glow{
margin:20px auto;
width:130px;
height:130px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,255,120,0.08);
box-shadow:
0 0 25px #00ff99,
0 0 50px #00ff99;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

#number{
font-size:70px;
font-weight:bold;
color:#00ff99;
text-shadow:0 0 25px #00ff99;
}

#size{
font-size:30px;
margin-top:10px;
text-shadow:0 0 10px #00ff99;
}

#timer{
margin-top:14px;
font-size:18px;
}

.cyber-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.box{
padding:14px;
border:1px solid #00ff99;
border-radius:12px;
background:rgba(0,255,120,0.06);
font-size:14px;
box-shadow:0 0 10px rgba(0,255,120,0.4);
}

.terminal{
text-align:left;
padding:15px;
border:1px solid #00ff99;
border-radius:12px;
background:#000;
margin-bottom:20px;
height:120px;
overflow:auto;
font-size:13px;
box-shadow:0 0 15px rgba(0,255,120,0.3);
}

.terminal p{
margin-bottom:8px;
color:#00ff99;
}

.join-btn{
display:inline-block;
padding:14px 28px;
border-radius:12px;
background:#00ff99;
color:#000;
font-weight:bold;
text-decoration:none;
box-shadow:0 0 20px #00ff99;
transition:0.3s;
}

.join-btn:hover{
transform:scale(1.05);
}

</style>

</head>
<body>

<div class="matrix"></div>

<div class="panel">

<h1>FULL ACTIVE SUCCESSFUL</h1>

<div class="clock-box">
<h2 id="wallclock">00:00:00</h2>
</div>

<div class="period-card">

<h2 id="period">PERIOD : 0000</h2>

<div class="number-glow">
<h1 id="number">0</h1>
</div>

<h2 id="size">SMALL</h2>

<p id="timer">NEXT UPDATE : 60 SEC</p>

</div>

<div class="cyber-grid">
<div class="box">FIREWALL : ACTIVE</div>
<div class="box">NODE : CONNECTED</div>
<div class="box">SERVER : ONLINE</div>
<div class="box">STATUS : STABLE</div>
</div>

<div class="terminal">
<p>> Monitoring cyber traffic...</p>
<p>> Active panel synchronized...</p>
<p>> Result engine secured...</p>
<p>> Live refresh active...</p>
</div>

<a class="join-btn"
href="https://www.jaiclub18.com/#/register?invitationCode=377572996558"
target="_blank">
OPEN LINK
</a>

</div>

<script>

let currentPeriod = 0;

/* ---------- CLOCK ---------- */

function updateClock(){

const now = new Date();

let h = now.getHours();
let m = now.getMinutes();
let s = now.getSeconds();

let ampm = h >= 12 ? "PM" : "AM";

h = h % 12;
h = h ? h : 12;

h = String(h).padStart(2,'0');
m = String(m).padStart(2,'0');
s = String(s).padStart(2,'0');

document.getElementById("wallclock").innerHTML =
h + ":" + m + ":" + s + " " + ampm;

}

/* ---------- PERIOD ---------- */

function calculatePeriod(){

const now = new Date();

let start = new Date(now);

start.setHours(5,30,0,0);

if(now < start){
start.setDate(start.getDate()-1);
}

const diff =
Math.floor((now - start)/60000) + 1;

return diff;

}

/* ---------- HASH RNG ---------- */

function generateHash(input){

let hash = 0;

for(let i = 0; i < input.length; i++){

hash =
((hash << 5) - hash) + input.charCodeAt(i);

hash |= 0;

}

return Math.abs(hash);

}

/* ---------- HIGH FREQUENCY LOGIC ---------- */

function getHighFrequencyNumber(period){

const now = new Date();

const seed =
period +
"-" +
now.getHours() +
"-" +
now.getMinutes();

const hash = generateHash(seed);

/*
HIGH FREQUENCY:
0-4 = more chances
5-9 = less chances
*/

const weightedNumbers = [

0,0,0,
1,1,1,
2,2,2,
3,3,
4,4,

5,
6,
7,
8,
9

];

const index =
hash % weightedNumbers.length;

return weightedNumbers[index];

}

/* ---------- RESULT ---------- */

function updateResult(){

currentPeriod = calculatePeriod();

document.getElementById("period").innerHTML =
"PERIOD : " +
String(currentPeriod).padStart(4,'0');

const num = getHighFrequencyNumber(currentPeriod);

document.getElementById("number").innerHTML =
num;

if(num <= 4){

document.getElementById("size").innerHTML =
"SMALL";

}else{

document.getElementById("size").innerHTML =
"BIG";

}

}

/* ---------- TIMER ---------- */

function updateTimer(){

const now = new Date();

const sec = 60 - now.getSeconds();

document.getElementById("timer").innerHTML =
"NEXT UPDATE : " + sec + " SEC";

if(sec === 60 || sec === 0){
updateResult();
}

}

/* ---------- START ---------- */

updateClock();
updateResult();
updateTimer();

setInterval(updateClock,1000);
setInterval(updateTimer,1000);

</script>

</body>
</html>
