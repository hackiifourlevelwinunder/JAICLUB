<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER DASHBOARD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
overflow:hidden;
color:#00ff99;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:8px;
}

/* BACKGROUND */

.matrix{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(rgba(0,255,120,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,120,0.08) 1px, transparent 1px);
background-size:28px 28px;
animation:gridmove 8s linear infinite;
z-index:0;
}

@keyframes gridmove{
0%{transform:translateY(0);}
100%{transform:translateY(28px);}
}

/* PANEL */

.panel{
position:relative;
z-index:1;
width:100%;
max-width:390px;
background:rgba(0,0,0,0.92);
border:2px solid #00ff99;
border-radius:18px;
padding:16px;
box-shadow:0 0 25px #00ff99;
text-align:center;
}

.panel h1{
font-size:20px;
margin-bottom:16px;
text-shadow:0 0 14px #00ff99;
}

/* CLOCK */

.clock-box{
padding:14px;
border:1px solid #00ff99;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 0 16px #00ff99;
}

#wallclock{
font-size:30px;
font-weight:bold;
}

/* CARD */

.period-card{
padding:18px;
border:1px solid #00ff99;
border-radius:18px;
box-shadow:0 0 20px rgba(0,255,150,0.5);
margin-bottom:16px;
}

#period{
font-size:34px;
font-weight:bold;
margin-bottom:18px;
text-shadow:0 0 14px #00ff99;
}

/* NUMBER */

.number-glow{
margin:16px auto;
width:150px;
height:150px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,255,120,0.08);
box-shadow:
0 0 30px #00ff99,
0 0 80px #00ff99;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

#number{
font-size:90px;
font-weight:bold;
color:#00ff99;
text-shadow:0 0 30px #00ff99;
}

#size{
font-size:42px;
margin-top:12px;
font-weight:bold;
text-shadow:0 0 15px #00ff99;
}

#timer{
margin-top:14px;
font-size:20px;
font-weight:bold;
}

#status{
margin-top:10px;
font-size:16px;
font-weight:bold;
}

/* GRID */

.cyber-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:16px;
}

.box{
padding:14px;
border:1px solid #00ff99;
border-radius:12px;
background:rgba(0,255,120,0.06);
font-size:13px;
font-weight:bold;
box-shadow:0 0 10px rgba(0,255,120,0.4);
}

/* TERMINAL */

.terminal{
text-align:left;
padding:14px;
border:1px solid #00ff99;
border-radius:14px;
background:#000;
margin-bottom:18px;
height:160px;
overflow:auto;
font-size:12px;
box-shadow:0 0 16px rgba(0,255,120,0.3);
}

.terminal p{
margin-bottom:8px;
color:#00ff99;
font-weight:bold;
}

/* BUTTON */

.join-btn{
display:inline-block;
padding:14px 28px;
border-radius:14px;
background:#00ff99;
color:#000;
font-weight:bold;
font-size:16px;
text-decoration:none;
box-shadow:0 0 20px #00ff99;
}

</style>
</head>

<body>

<div class="matrix"></div>

<div class="panel">

<h1>FULL ACTIVE SUCCESSFUL</h1>

<div class="clock-box">
<h2 id="wallclock">00:00:00</h2>
</div>

<div class="period-card">

<h2 id="period">0000</h2>

<div class="number-glow">
<h1 id="number">0</h1>
</div>

<h2 id="size">WAIT...</h2>

<p id="timer">NEXT UPDATE : 60 SEC</p>

<div id="status">CONNECTING...</div>

</div>

<div class="cyber-grid">
<div class="box">FIREWALL : ACTIVE</div>
<div class="box">NODE : CONNECTED</div>
<div class="box">SERVER : ONLINE</div>
<div class="box">SYSTEM : STABLE</div>
</div>

<div class="terminal" id="terminal">
<p>> Smart engine started...</p>
</div>

<a class="join-btn"
href="https://www.jaiclub18.com/#/register?invitationCode=377572996558"
target="_blank">
OPEN LINK
</a>

</div>

<script>

/* =========================
   WORKING API
========================= */

const API =
"https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json";

/* CORS FIX */

const PROXY =
"https://api.allorigins.win/raw?url=" +
encodeURIComponent(API);

let lastPeriod = "";

/* CLOCK */

function updateClock(){

const now = new Date();

let h = now.getHours();
let m = now.getMinutes();
let s = now.getSeconds();

let ampm =
h >= 12
? "PM"
: "AM";

h = h % 12;
h = h ? h : 12;

h = String(h).padStart(2,"0");
m = String(m).padStart(2,"0");
s = String(s).padStart(2,"0");

document.getElementById("wallclock").innerHTML =
`${h}:${m}:${s} ${ampm}`;

}

/* TERMINAL */

function addTerminal(text){

const terminal =
document.getElementById("terminal");

const p =
document.createElement("p");

p.innerHTML =
"> " + text;

terminal.prepend(p);

if(
terminal.children.length > 25
){

terminal.removeChild(
terminal.lastChild
);

}

}

/* PERIOD */

function getNextPeriod(){

const now = new Date();

return String(
1051 + now.getMinutes()
);

}

/* ANALYSIS */

function smartPredict(history){

let results = [];

/* LAST 20 */

for(
let i=0;
i<Math.min(20,history.length);
i++
){

results.push(
Number(
history[i].number ??
history[i].result ??
0
)
);

}

/* SAFE */

if(results.length < 5){

return {

side:"WAIT...",
number:0,
big:0,
small:0

};

}

/* COUNT */

let big = 0;
let small = 0;

results.forEach(n=>{

if(n <= 4){

small++;

}else{

big++;

}

});

/* FREQUENCY */

let freq = {};

for(let i=0;i<=9;i++){

freq[i]=0;

}

results.forEach(n=>{

freq[n]++;

});

/* HOT */

let hot = 0;

for(let i=1;i<=9;i++){

if(freq[i] > freq[hot]){

hot = i;

}

}

/* TREND */

let side =
big >= small
? "BIG"
: "SMALL";

/* STREAK */

const a = results[0];
const b = results[1];
const c = results[2];

if(
a <=4 &&
b <=4 &&
c <=4
){

side = "SMALL";

}

if(
a >=5 &&
b >=5 &&
c >=5
){

side = "BIG";

}

/* NUMBER */

let nextNumber;

if(side == "BIG"){

const arr = [5,6,7,8,9];

arr.sort(
(x,y)=>
freq[y]-freq[x]
);

nextNumber = arr[0];

}else{

const arr = [0,1,2,3,4];

arr.sort(
(x,y)=>
freq[y]-freq[x]
);

nextNumber = arr[0];

}

/* REPEAT FIX */

if(nextNumber == results[0]){

if(side == "BIG"){

nextNumber = 7;

}else{

nextNumber = 2;

}

}

return {

side,
number:nextNumber,
big,
small,
hot

};

}

/* FETCH */

async function fetchGame(){

try{

document.getElementById("status").innerHTML =
"CONNECTING...";

/* FETCH */

const response =
await fetch(PROXY);

/* CHECK */

if(!response.ok){

throw new Error(
"API ERROR"
);

}

/* JSON */

const data =
await response.json();

/* HISTORY */

let history = [];

/* SAFE */

if(
data &&
data.data &&
Array.isArray(data.data.list)
){

history = data.data.list;

}
else if(
data &&
Array.isArray(data.list)
){

history = data.list;

}
else{

throw new Error(
"INVALID DATA"
);

}

/* EMPTY */

if(history.length === 0){

throw new Error(
"EMPTY DATA"
);

}

/* CURRENT */

const latest =
history[0];

const currentPeriod =
String(
latest.issueNumber ??
latest.issue ??
latest.period ??
"0000"
);

const currentResult =
Number(
latest.number ??
latest.result ??
0
);

/* NEXT */

const nextPeriod =
getNextPeriod();

/* ANALYSIS */

const predict =
smartPredict(history);

/* UI */

document.getElementById("period").innerHTML =
nextPeriod;

document.getElementById("number").innerHTML =
predict.number;

document.getElementById("size").innerHTML =
predict.side;

document.getElementById("status").innerHTML =
"SMART DETECT ACTIVE";

/* TERMINAL */

if(lastPeriod != currentPeriod){

lastPeriod = currentPeriod;

addTerminal(
`Last Result : ${currentResult}`
);

addTerminal(
`Next Period : ${nextPeriod}`
);

addTerminal(
`Hot Number : ${predict.hot}`
);

addTerminal(
`Big : ${predict.big} | Small : ${predict.small}`
);

addTerminal(
`Prediction : ${predict.number} ${predict.side}`
);

}

}
catch(error){

console.log(error);

document.getElementById("status").innerHTML =
"SERVER ONLINE";

document.getElementById("size").innerHTML =
"WAIT...";

addTerminal(
"Connection retry..."
);

}

}

/* TIMER */

function updateTimer(){

const now = new Date();

const seconds =
60 - now.getSeconds();

document.getElementById("timer").innerHTML =
"NEXT UPDATE : " +
seconds +
" SEC";

if(
seconds == 60 ||
seconds == 0
){

fetchGame();

}

}

/* START */

updateClock();
updateTimer();
fetchGame();

setInterval(updateClock,1000);
setInterval(updateTimer,1000);

</script>

</body>
</html>
